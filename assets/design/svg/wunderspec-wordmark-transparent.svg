<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240" role="img" aria-label="wunderspec wordmark">
  <title>wunderspec wordmark</title>

  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#061426"/>
      <stop offset="70%" stop-color="#020A17"/>
      <stop offset="100%" stop-color="#000713"/>
    </radialGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lineGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowAmber" markerWidth="2.8" markerHeight="2.8" refX="2.45" refY="1.4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L2.8,1.4 L0,2.8 Z" fill="#FFB22E"/>
    </marker>
    <marker id="arrowCyan" markerWidth="2.8" markerHeight="2.8" refX="2.45" refY="1.4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L2.8,1.4 L0,2.8 Z" fill="#7BE8F4"/>
    </marker>
    <style>
      .wordmark { font-family: 'JetBrains Mono', 'SFMono-Regular', 'DejaVu Sans Mono', 'Liberation Mono', monospace; font-weight: 500; letter-spacing: 0.18em; fill: #F8FBFF; }
      .tagline { font-family: 'JetBrains Mono', 'SFMono-Regular', 'DejaVu Sans Mono', 'Liberation Mono', monospace; font-weight: 400; letter-spacing: 0.08em; fill: #FFB22E; }
      .tagline-muted { font-family: 'JetBrains Mono', 'SFMono-Regular', 'DejaVu Sans Mono', 'Liberation Mono', monospace; font-weight: 400; letter-spacing: 0.08em; fill: #92A8C7; }
      .small { font-family: 'JetBrains Mono', 'SFMono-Regular', 'DejaVu Sans Mono', 'Liberation Mono', monospace; font-weight: 400; letter-spacing: 0.06em; fill: #92A8C7; }
    </style>
  </defs>

  
  
  <text x="48" y="124" class="wordmark" font-size="82">wunderspec</text>
  <text x="54" y="188" class="tagline" font-size="30">Specs you code</text>

</svg>
